kind = "video"
previewPath = "/app-preview-video/"
title = "Hospice Roadmap — App Store Preview"
version = "1.0.0"
id = "artifacts/app-preview-video"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/app-preview-video/" ]
localPort = 24541

[services.development]
run = "pnpm --filter @workspace/app-preview-video run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/app-preview-video", "run", "build" ]
publicDir = "artifacts/app-preview-video/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24541"
BASE_PATH = "/app-preview-video/"
