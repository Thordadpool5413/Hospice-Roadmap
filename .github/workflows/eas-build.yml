name: EAS Build

on:
  push:
    branches: [main, master]
    paths:
      - 'artifacts/mobile/**'
      - 'lib/**'
      - '.github/workflows/eas-build.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - development
          - preview
          - production
      api_url:
        description: 'Optional hosted API URL for manual builds (for example https://example.com/api)'
        required: false
        type: string
      domain:
        description: 'Optional hosted domain for manual builds when api_url is not provided'
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Mobile CI / EAS Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: artifacts/mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        working-directory: .
        run: pnpm install --frozen-lockfile

      - name: Typecheck shipping packages
        if: github.event_name == 'push'
        working-directory: .
        run: |
          pnpm run typecheck:libs
          pnpm run repo:mobile:typecheck
          pnpm run repo:api:typecheck

      - name: Validate Expo config
        if: github.event_name == 'push'
        env:
          EAS_BUILD_PROFILE: preview
          EXPO_PUBLIC_API_URL: https://ci-placeholder.invalid/api
          EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ci_placeholder
        run: pnpm exec expo config --type public > /dev/null

      - name: Setup EAS
        if: github.event_name == 'workflow_dispatch'
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Validate EAS config
        if: github.event_name == 'workflow_dispatch'
        env:
          EAS_BUILD_PROFILE: ${{ github.event.inputs.profile || 'preview' }}
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_API_URL: ${{ github.event.inputs.api_url || vars.EXPO_PUBLIC_API_URL }}
          EXPO_PUBLIC_DOMAIN: ${{ github.event.inputs.domain || vars.EXPO_PUBLIC_DOMAIN }}
          EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ vars.EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_PUBLISHABLE_KEY: ${{ vars.CLERK_PUBLISHABLE_KEY }}
        run: pnpm exec eas config --platform ios --profile ${{ github.event.inputs.profile || 'preview' }} --non-interactive > /dev/null

      - name: Build
        if: github.event_name == 'workflow_dispatch'
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_API_URL: ${{ github.event.inputs.api_url || vars.EXPO_PUBLIC_API_URL }}
          EXPO_PUBLIC_DOMAIN: ${{ github.event.inputs.domain || vars.EXPO_PUBLIC_DOMAIN }}
          EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ vars.EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_PUBLISHABLE_KEY: ${{ vars.CLERK_PUBLISHABLE_KEY }}
        run: eas build --platform ios --profile ${{ github.event.inputs.profile || 'preview' }} --non-interactive