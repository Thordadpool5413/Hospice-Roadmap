name: EAS Build

on:
  push:
    branches: [main, master]
    paths:
      - 'artifacts/mobile/**'
      - 'artifacts/api-server/**'
      - 'lib/**'
      - '.github/workflows/eas-build.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'vitest.config.ts'
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - development
          - preview
          - production
      api_url:
        description: 'Optional hosted API URL for manual builds (for example https://example.com/api)'
        required: false
        type: string
      domain:
        description: 'Optional hosted domain for manual builds when api_url is not provided'
        required: false
        type: string
      clerk_publishable_key:
        description: 'Optional Clerk publishable key override when the selected EAS environment does not already provide one'
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Mobile CI / EAS Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: artifacts/mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        working-directory: .
        run: pnpm install --frozen-lockfile

      - name: Typecheck shipping packages
        working-directory: .
        run: |
          pnpm run typecheck:libs
          pnpm run repo:mobile:typecheck
          pnpm run repo:api:typecheck

      - name: Run tests
        if: github.event_name == 'push'
        working-directory: .
        run: pnpm test

      - name: Validate Expo config
        if: github.event_name == 'push'
        env:
          EAS_BUILD_PROFILE: preview
          EXPO_PUBLIC_API_URL: https://ci-placeholder.invalid/api
          EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ci_placeholder
        run: pnpm exec expo config --type public > /dev/null

      - name: Setup EAS
        if: github.event_name == 'workflow_dispatch'
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Validate EAS config
        if: github.event_name == 'workflow_dispatch'
        env:
          PROFILE: ${{ github.event.inputs.profile || 'preview' }}
          API_URL_OVERRIDE: ${{ github.event.inputs.api_url || vars.EXPO_PUBLIC_API_URL }}
          DOMAIN_OVERRIDE: ${{ github.event.inputs.domain || vars.EXPO_PUBLIC_DOMAIN }}
          CLERK_PUBLISHABLE_KEY_OVERRIDE: ${{ github.event.inputs.clerk_publishable_key || vars.EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY || vars.CLERK_PUBLISHABLE_KEY }}
        run: |
          set -euo pipefail
          pnpm exec eas env:exec --non-interactive "$PROFILE" '
            set -eu

            if [ -n "${API_URL_OVERRIDE:-}" ]; then
              export EXPO_PUBLIC_API_URL="$API_URL_OVERRIDE"
            fi

            if [ -n "${DOMAIN_OVERRIDE:-}" ]; then
              export EXPO_PUBLIC_DOMAIN="$DOMAIN_OVERRIDE"
            fi

            if [ -n "${CLERK_PUBLISHABLE_KEY_OVERRIDE:-}" ]; then
              export EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY="$CLERK_PUBLISHABLE_KEY_OVERRIDE"
            fi

            if [ "$PROFILE" = "preview" ] || [ "$PROFILE" = "production" ]; then
              if [ -z "${EXPO_PUBLIC_API_URL:-}" ] && [ -z "${EXPO_PUBLIC_DOMAIN:-}" ]; then
                echo "::error::Missing hosted API configuration. Supply workflow input api_url/domain or set EXPO_PUBLIC_API_URL / EXPO_PUBLIC_DOMAIN in the selected EAS environment."
                exit 1
              fi

              if [ -z "${EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY:-}" ] && [ -z "${CLERK_PUBLISHABLE_KEY:-}" ]; then
                echo "::error::Missing Clerk publishable key. Supply workflow input clerk_publishable_key or set EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY / CLERK_PUBLISHABLE_KEY in the selected EAS environment."
                exit 1
              fi
            fi

            export EAS_BUILD_PROFILE="$PROFILE"
            pnpm exec eas config --platform ios --profile "$PROFILE" --non-interactive > /dev/null
          '

      - name: Build
        if: github.event_name == 'workflow_dispatch'
        env:
          PROFILE: ${{ github.event.inputs.profile || 'preview' }}
          API_URL_OVERRIDE: ${{ github.event.inputs.api_url || vars.EXPO_PUBLIC_API_URL }}
          DOMAIN_OVERRIDE: ${{ github.event.inputs.domain || vars.EXPO_PUBLIC_DOMAIN }}
          CLERK_PUBLISHABLE_KEY_OVERRIDE: ${{ github.event.inputs.clerk_publishable_key || vars.EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY || vars.CLERK_PUBLISHABLE_KEY }}
        run: |
          set -euo pipefail
          pnpm exec eas env:exec --non-interactive "$PROFILE" '
            set -eu

            if [ -n "${API_URL_OVERRIDE:-}" ]; then
              export EXPO_PUBLIC_API_URL="$API_URL_OVERRIDE"
            fi

            if [ -n "${DOMAIN_OVERRIDE:-}" ]; then
              export EXPO_PUBLIC_DOMAIN="$DOMAIN_OVERRIDE"
            fi

            if [ -n "${CLERK_PUBLISHABLE_KEY_OVERRIDE:-}" ]; then
              export EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY="$CLERK_PUBLISHABLE_KEY_OVERRIDE"
            fi

            export EAS_BUILD_PROFILE="$PROFILE"
            if [ "$PROFILE" = "preview" ] || [ "$PROFILE" = "production" ]; then
              eas build --platform ios --profile "$PROFILE" --non-interactive --wait --auto-submit-with-profile production
            else
              eas build --platform ios --profile "$PROFILE" --non-interactive --wait
            fi
          '